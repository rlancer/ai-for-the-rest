repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: uv run --project packages/cli ruff check --fix
        language: system
        types_or: [python, pyi]
        files: ^packages/cli/
      - id: ruff-format
        name: ruff format
        entry: uv run --project packages/cli ruff format
        language: system
        types_or: [python, pyi]
        files: ^packages/cli/
